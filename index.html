<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>FZ CardBook</title>

    <meta name="theme-color" content="#ffffff">

    <link rel="manifest" href="manifest.json">

    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div id="app">

    <!-- ================= HEADER ================= -->

    <header class="header">

        <div class="logo">
            <h1>FZ CardBook💜🧡🩵❤️💚🩷💛</h1>
            <p>FRUITS ZIPPER Trading Card Collection</p>
        </div>

    </header>

    <!-- ================= DASHBOARD ================= -->

    <section class="dashboard">

        <div class="stat-card">
            <span class="label">所持率</span>
            <span id="ownedRate">0%</span>
        </div>

        <div class="stat-card">
            <span class="label">所持</span>
            <span id="ownedCount">0</span>
        </div>

        <div class="stat-card">
            <span class="label">未所持</span>
            <span id="missingCount">0</span>
        </div>

        <div class="stat-card">
            <span class="label">シリーズ</span>
            <span id="seriesCount">0</span>
        </div>

    </section>

    <!-- ================= FILTER ================= -->

    <section class="filters">

        <select id="memberSelect">

            <option value="all">全メンバー</option>
            <option value="karen">松本かれん</option>
            <option value="yui">櫻井優衣</option>

        </select>

        <select id="typeSelect">

            <option value="all">全種類</option>
            <option value="paper">紙トレカ</option>
            <option value="clear">クリアトレカ</option>

        </select>

        <select id="seriesSelect">

            <option value="all">全シリーズ</option>

        </select>

        <input
            id="searchInput"
            type="search"
            placeholder="カード名・シリーズ検索">

    </section>

    <!-- ================= SERIES INFO ================= -->

    <section class="series-progress">

        <div class="series-header">

            <h2 id="seriesTitle">
                全シリーズ
            </h2>

            <span id="seriesProgress">
                0 / 0
            </span>

        </div>

        <div class="progress-bar">

            <div
                id="progressFill"
                class="progress-fill">
            </div>

        </div>

    </section>

    <!-- ================= CARD LIST ================= -->

    <main>

        <section
            id="cardGrid"
            class="card-grid">

        </section>

    </main>

</div>

<!-- ================= MODAL ================= -->

<div id="cardModal" class="modal hidden">

    <div class="modal-content">

        <button id="closeModal" class="close-btn">
            ✕
        </button>

        <img
            id="modalImage"
            src=""
            alt="">

        <div class="modal-info">

            <h2 id="modalTitle"></h2>

            <p id="modalSeries"></p>

            <p id="modalType"></p>

            <p id="modalNumber"></p>

            <button id="toggleBackImage">
                裏面
            </button>

        </div>

    </div>

</div>

<script src="js/config.js"></script>
<script src="js/storage.js"></script>
<script src="js/cards.js"></script>
<script src="js/sheets.js"></script>
<script src="js/ui.js"></script>
<script src="js/app.js"></script>

</body>
</html>
